<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RocketPrep.Comic - Flipbook Reader</title>
    <link rel="stylesheet" href="comic.css?v=3">
</head>
<body>
    <div class="comic-container">
        <!-- Header -->
        <header class="comic-header">
            <a href="../index.html" class="back-button">← Back to Home</a>
            <h1><span class="rocket-prep-font">RocketPrep.Comic</span> </h1>
            <div class="page-counter">
                <span id="current-page">1</span> / <span id="total-pages">49</span>
            </div>
        </header>

        <!-- Flipbook -->
        <div class="flipbook-wrapper">
            <div class="book">
                <div class="book-spine-left"></div>
                
                <div class="pages-container">
                    <!-- Left Page -->
                    <div class="page page-left">
                        <img id="left-page-img" src="pages/page-001.jpg" alt="Left page">
                    </div>
                    
                    <!-- Right Page -->
                    <div class="page page-right">
                        <img id="right-page-img" src="pages/page-002.jpg" alt="Right page">
                    </div>
                </div>

                <div class="book-spine-right"></div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button id="prev-button" class="nav-button">← Previous</button>
            
            <div class="slider-container">
                <input type="range" id="page-slider" min="0" max="48" value="0" class="page-slider">
            </div>
            
            <button id="next-button" class="nav-button">Next →</button>
        </div>

        <!-- Community Questions Section -->
        <section class="qna-section">
            <h2>Community Questions</h2>
            
            <!-- Q&A Form -->
            <div class="qna-form-container">
                <h3>Ask a Question</h3>
                <form id="qna-form">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="question">Question:</label>
                        <textarea id="question" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Submit Question</button>
                    <div id="form-message" class="form-message"></div>
                </form>
            </div>
            
            <!-- Q&A List -->
            <div class="qna-list-container">
                <h3>Questions & Answers</h3>
                <div id="qna-list" class="qna-list"></div>
            </div>
        </section>
    </div>

    <script src="comic.js"></script>
</body>
</html>
